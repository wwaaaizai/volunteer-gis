server:
  port: 8080

spring:
  application:
    name: volunteer-server
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: ${MYSQL_URL:jdbc:mysql://localhost:3306/volunteer_db?useUnicode=true&characterEncoding=utf-8&serverTimezone=Asia/Shanghai&useSSL=false&allowPublicKeyRetrieval=true}
    username: ${MYSQL_USERNAME:root}
    password: ${MYSQL_PASSWORD:Cumt123}
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 20MB

# MyBatis-Plus
mybatis-plus:
  configuration:
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
    map-underscore-to-camel-case: true
  global-config:
    db-config:
      id-type: auto
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0

# JWT
jwt:
  # HS256 密钥（MVP阶段使用对称加密，至少256位）；生产环境请通过环境变量覆盖
  secret: ${JWT_SECRET:volunteer-gis-campus-2026-secret-key-must-be-at-least-256-bits-long}
  expiration: 86400000  # 24小时（毫秒）

# 文件上传
volunteer:
  upload:
    path: ./uploads
