server:
  port: 8081

spring:
  application:
    name: volunteer-server
  jackson:
    time-zone: Asia/Shanghai
    date-format: yyyy-MM-dd HH:mm:ss
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3306/volunteer_db?useUnicode=true&characterEncoding=utf-8&serverTimezone=Asia/Shanghai&useSSL=false&allowPublicKeyRetrieval=true
    username: root
    password: ${MYSQL_PASSWORD:Cumt123}
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 20MB

# MyBatis-Plus
mybatis-plus:
  configuration:
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
    map-underscore-to-camel-case: true
  global-config:
    db-config:
      id-type: auto
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0

# JWT
jwt:
  secret: volunteer-gis-campus-2026-secret-key-must-be-at-least-256-bits-long
  expiration: 86400000

# 文件上传
app:
  upload:
    dir: ./uploads
volunteer:
  upload:
    path: ./uploads

# AI 配置（智谱 GLM API）
ai:
  provider: zhipu
  api-key: 371b384b8a254747a2fa0a22fdf13274.x3tdwpP0vqziMb7a
  model: glm-4-flash
